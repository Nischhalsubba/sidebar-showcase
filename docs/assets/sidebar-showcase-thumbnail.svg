  <text x="1130" y="596" text-anchor="end" fill="#94A3B8" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="700" letter-spacing="3">NISCHHALSUBBA / SIDEBAR-SHOWCASE</text>
