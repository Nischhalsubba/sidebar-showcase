        </g>
        <g transform="translate(162 0)">
          <rect width="145" height="48" rx="12" fill="#1E293B" stroke="#3B82F6"/>
          <circle cx="22" cy="24" r="6" fill="#3B82F6"/>
          <text x="38" y="29" fill="#F8FAFC" font-family="Inter,Arial,sans-serif" font-size="14">Dark Navigation</text>
        </g>
        <g transform="translate(324 0)">
