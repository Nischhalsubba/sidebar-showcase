    <text x="0" y="82" fill="#F8FAFC" font-family="Inter,Arial,sans-serif" font-size="70" font-weight="800">Sidebar</text>
    <text x="0" y="150" fill="#818CF8" font-family="Inter,Arial,sans-serif" font-size="70" font-weight="800">Showcase</text>
    <text x="2" y="196" fill="#CBD5E1" font-family="Inter,Arial,sans-serif" font-size="20">Six variants. One interaction engine. One reducer-driven playground.</text>

    <g transform="translate(0 240)">
