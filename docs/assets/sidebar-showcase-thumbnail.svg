          <circle cx="22" cy="24" r="6" fill="#6366F1"/>
          <text x="38" y="29" fill="#F8FAFC" font-family="Inter,Arial,sans-serif" font-size="14">Dual Panel</text>
        </g>
        <g transform="translate(162 66)">
          <rect width="145" height="48" rx="12" fill="#1E293B" stroke="#10B981"/>
          <circle cx="22" cy="24" r="6" fill="#10B981"/>
          <text x="38" y="29" fill="#F8FAFC" font-family="Inter,Arial,sans-serif" font-size="14">Green Minimal</text>
        </g>
        <g transform="translate(324 66)">
