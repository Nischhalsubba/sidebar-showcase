<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Sidebar Showcase repository thumbnail</title>
  <desc id="desc">A dark dashboard workspace displaying six colorful sidebar variants and an activity panel.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1020"/>
      <stop offset="0.55" stop-color="#111827"/>
      <stop offset="1" stop-color="#1E293B"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="1200" height="630" rx="28" fill="url(#bg)"/>
  <circle cx="1010" cy="80" r="250" fill="#6366F1" opacity="0.12"/>
  <circle cx="130" cy="590" r="240" fill="#10B981" opacity="0.08"/>

  <g transform="translate(70 72)">
