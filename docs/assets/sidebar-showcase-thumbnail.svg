      <text x="18" y="58" fill="#64748B" font-family="Inter,Arial,sans-serif" font-size="12">Active Variant</text>
      <text x="18" y="88" fill="#0F172A" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="700">Dual Panel</text>

      <rect x="0" y="136" width="250" height="84" rx="16" fill="#ECFDF5"/>
      <text x="18" y="162" fill="#64748B" font-family="Inter,Arial,sans-serif" font-size="12">Search State</text>
