          <circle cx="22" cy="24" r="6" fill="#F97316"/>
          <text x="38" y="29" fill="#F8FAFC" font-family="Inter,Arial,sans-serif" font-size="14">Grouped Cards</text>
        </g>
        <g transform="translate(0 66)">
