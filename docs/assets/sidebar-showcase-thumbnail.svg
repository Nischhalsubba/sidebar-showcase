      <rect x="0" y="240" width="250" height="170" rx="16" fill="#F8FAFC" stroke="#E2E8F0"/>
      <text x="18" y="268" fill="#64748B" font-family="Inter,Arial,sans-serif" font-size="12">ACTIVITY TIMELINE</text>
      <circle cx="22" cy="304" r="5" fill="#6366F1"/>
      <rect x="38" y="299" width="170" height="10" rx="5" fill="#CBD5E1"/>
      <circle cx="22" cy="336" r="5" fill="#10B981"/>
      <rect x="38" y="331" width="142" height="10" rx="5" fill="#CBD5E1"/>
      <circle cx="22" cy="368" r="5" fill="#EA580C"/>
      <rect x="38" y="363" width="186" height="10" rx="5" fill="#CBD5E1"/>
